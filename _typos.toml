[files]
extend-exclude = [
    ".clang-format",
    ".clang-tidy",
    ".devcontainer/**",
    ".git/**",
    ".github/**",
    ".gitignore",
    ".gitmodules",
    ".gitpod.yml",
    ".hadolint.yaml",
    "CMakeLists.txt",
    "Dockerfile",
    "LICENSE",
    "LICENSE-3RD-PARTY.txt",
    "Package.swift",
    "README.md",
    "SECURITY.MD",
    "WalletCore.podspec",
    "android/**",
    "audit/**",
    "bootstrap.sh",
    "cmake/**",
    "codegen/**",
    "codegen-v2/**",
    "coverage.stats",
    "docs/**",
    "gitpod.Dockerfile",
    "include/**",
    "jni/**",
    "kotlin/**",
    "protobuf-plugin/**",
    "registry.json",
    "samples/**",
    "sonar-project.properties",
    "src/**",
    "swift/**",
    "tests/**",
    "tools/**",
    "trezor-crypto/**",
    "wallet_core.srctrlprj",
    "walletconsole/**",
    "wasm/**",
]

[default.extend-words]
inout = "inout"

[default.extend-identifiers]
ANC = "ANC"
datas = "datas"


